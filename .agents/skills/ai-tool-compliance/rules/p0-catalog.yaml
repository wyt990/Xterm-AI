# AI Tool Compliance - P0 Rule Catalog
# 내부 AI 툴 필수 구현 가이드 v1.1 기반
# 단일 P0 FAIL → 배포 자동 차단
# Total P0 score: 100점 (11 rules)
# Domain weights: Security 40 / Auth 25 / Cost 20 / Logging 15
#
# tier 1: static_analysis (grep 완전 자동)
# tier 2: static_analysis (grep 선별 후 판정)
# tier 3: code_review/log_check (grep 선별 → MANUAL_REVIEW or FAIL)

rules:
  - id: AUTH-P0-001
    domain: auth
    severity: P0
    tier: 2
    name: "신규 가입자 Role=Guest 강제"
    description: >
      신규 가입 계정의 기본 역할(role)은 반드시 'guest'이어야 한다.
      가입 처리 코드(signup, register, createUser, onUserCreate 등)에서
      role을 명시적으로 'guest'로 설정해야 하며, admin/manager/viewer 등
      다른 역할이 자동 부여되어서는 안 된다.
    check_type: static_analysis
    grep_patterns:
      - "signup|register|createUser|onUserCreate"
    must_contain:
      - "role.*['\"]guest['\"]"
      - "defaultRole.*guest"
      - "role.*=.*guest"
    must_not_contain:
      - "role.*['\"]admin['\"]"
      - "role.*['\"]manager['\"]"
      - "role.*['\"]viewer['\"]"
    pass_condition: "가입 코드에서 role='guest' 기본값 설정"
    fail_condition: "가입 시 guest 이외 역할 자동 부여"
    remediation: >
      사용자 생성 핸들러(onUserCreate, createUser, signup 등)에서
      기본 role을 명시적으로 'guest'로 설정한다.
      예: { role: 'guest' } 또는 defaultRole = 'guest'
      admin/manager 등의 역할은 명시적 초대 또는 승인 절차를 통해서만 부여한다.
    score_impact: 8

  - id: AUTH-P0-002
    domain: auth
    severity: P0
    tier: 3
    name: "Guest 메뉴/API 접근 차단"
    description: >
      Guest 역할의 사용자는 보호된 메뉴와 API 엔드포인트에 접근할 수 없어야 한다.
      미들웨어 또는 가드(guard)에서 Guest 역할을 명시적으로 차단하는 로직이
      존재해야 한다. 인증된 사용자라도 role=guest이면 접근이 거부되어야 한다.
    check_type: code_review
    grep_patterns:
      - "guard|middleware|authorize|isGuest|guestBlock|guestDeny"
    must_contain:
      - "guest.*block|guest.*deny|role.*guest.*reject|isGuest.*&&"
    must_not_contain: []
    pass_condition: "미들웨어에서 Guest 역할 명시적 접근 차단 존재"
    fail_condition: "Guest 역할 체크 없이 모든 인증된 사용자에게 동일 접근 허용"
    remediation: >
      인증 미들웨어 또는 가드에서 role === 'guest' 조건을 추가하여
      접근을 명시적으로 차단한다.
      예: if (user.role === 'guest') return res.status(403).json({ error: 'Forbidden' });
      또는 @Guard(Role.GUEST_DENY) 데코레이터를 보호 라우트에 적용한다.
    score_impact: 7

  - id: AUTH-P0-003
    domain: auth
    severity: P0
    tier: 2
    name: "서버 최종 권한 검증"
    description: >
      모든 API 핸들러(router.get, router.post 등)에 서버 사이드 권한 검증
      미들웨어가 적용되어야 한다. 클라이언트 사이드 권한 체크만으로는 부족하며,
      서버에서 auth/verify/authenticate/requireAuth/verifyToken/checkAuth 등의
      미들웨어가 반드시 동작해야 한다.
    check_type: static_analysis
    grep_patterns:
      - "router\\.(get|post|put|delete|patch)"
    must_contain:
      - "auth|verify|authenticate|requireAuth|verifyToken|checkAuth"
    must_not_contain: []
    pass_condition: "모든 API 핸들러에 서버 사이드 권한 검증 미들웨어 적용"
    fail_condition: "일부 API에 미들웨어 누락 또는 클라이언트 권한 체크만 존재"
    remediation: >
      모든 라우터 정의에 인증 미들웨어를 추가한다.
      예: router.get('/resource', requireAuth, handler)
      또는 router.use(verifyToken)으로 전체 라우터에 일괄 적용한다.
      클라이언트에서만 권한을 체크하고 서버에서 검증하지 않는 패턴을 제거한다.
    score_impact: 10

  - id: SEC-P0-004
    domain: security
    severity: P0
    tier: 1
    name: "Firestore 직접 접근 금지"
    description: >
      클라이언트 소스코드에서 Firebase Firestore SDK를 직접 호출하는 코드가
      존재해서는 안 된다. firebase/firestore import, getDocs, setDoc, addDoc,
      updateDoc, deleteDoc, getFirestore, collection(db 등의 패턴이
      클라이언트 경로에서 발견되면 즉시 배포 차단이다.
      모든 데이터 접근은 서버 API(Cloud Functions 등)를 통해야 한다.
    check_type: static_analysis
    grep_patterns:
      - "firebase/firestore|getDocs|setDoc|addDoc|updateDoc|deleteDoc|getFirestore|collection\\(db"
    must_contain: []
    must_not_contain:
      - "firebase/firestore|getDocs|setDoc|addDoc|updateDoc|deleteDoc|getFirestore|collection\\(db"
    pass_condition: "클라이언트 코드에서 Firestore 직접 접근 코드 없음"
    fail_condition: "클라이언트 경로에서 Firestore SDK import 또는 직접 접근 코드 발견"
    remediation: >
      클라이언트 코드에서 Firebase Firestore SDK import를 모두 제거한다.
      데이터 접근이 필요한 경우 서버 API 엔드포인트(fetch, axios 등)를 호출하도록
      변경한다. Firestore SDK는 server/api/functions 디렉토리에서만 사용한다.
    score_impact: 12

  - id: SEC-P0-005
    domain: security
    severity: P0
    tier: 1
    name: "외부 API Gateway 강제"
    description: >
      클라이언트 또는 비-Gateway 서버 코드에서 외부 AI API(OpenAI, Anthropic,
      Google Generative AI 등)를 직접 호출해서는 안 된다.
      모든 AI API 호출은 내부 Gateway(Cloud Functions 등)를 경유해야 한다.
      fetch로 외부 AI 도메인에 직접 요청하거나 openai/anthropic SDK를
      클라이언트에서 사용하는 패턴이 발견되면 배포 차단이다.
    check_type: static_analysis
    grep_patterns:
      - "fetch.*https?://|openai|anthropic|generativelanguage"
    must_contain: []
    must_not_contain:
      - "fetch\\(['\"]https?://(?!localhost)|openai\\.com|generativelanguage\\.googleapis\\.com|anthropic\\.com|api\\.openai|generativeai"
    pass_condition: "모든 외부 AI API 호출이 내부 Gateway(Cloud Functions) 경유"
    fail_condition: "클라이언트 또는 비-Gateway 서버에서 AI API 직접 호출 발견"
    remediation: >
      클라이언트에서 openai, anthropic, generativelanguage 등 외부 AI API로의
      직접 fetch 호출을 제거한다. 대신 내부 Cloud Functions 엔드포인트를 호출한다.
      AI SDK는 Gateway 역할을 하는 Cloud Functions 내부에서만 사용한다.
      API 키는 서버 환경 변수에만 저장하고 클라이언트에 노출하지 않는다.
    score_impact: 18

  - id: SEC-P0-009
    domain: security
    severity: P0
    tier: 3
    name: "민감 텍스트 서버 처리"
    description: >
      AI 응답 전문(raw_response, model_output), 프롬프트 원문, 또는 민감한 내부
      정보(token, password 등)가 클라이언트 API 응답에 직접 포함되어서는 안 된다.
      클라이언트에는 응답 ID 또는 요약만 반환하고, 원문은 서버에서만 처리·저장해야 한다.
      console.log로 token이나 password를 출력하는 것도 금지된다.
    check_type: code_review
    grep_patterns:
      - "res\\.json|return.*response|response\\.send"
    must_contain: []
    must_not_contain:
      - "res\\.json.*prompt|return.*prompt|response.*raw_response|res\\.json.*model_output|console\\.log.*token|console\\.log.*password"
    pass_condition: "클라이언트에는 응답 ID/요약만 반환, 원문은 서버에서만 처리/저장"
    fail_condition: "AI 응답 전문 또는 프롬프트 원문이 클라이언트 응답에 직접 포함"
    remediation: >
      AI 호출 핸들러의 응답 객체에서 민감 필드(prompt, raw_response, model_output 등)를
      제외하는 sanitizeResponse() 함수를 구현하고 모든 AI 관련 API 응답 경로에 적용한다.
      응답에는 result_id, status, summary 등 참조값만 포함한다.
      console.log에서 token, password, key 등 민감 값을 출력하지 않는다.
    score_impact: 10

  - id: COST-P0-006
    domain: cost
    severity: P0
    tier: 2
    name: "모델 호출 비용 로그"
    description: >
      모든 AI 모델 호출(openai, vertexai, gemini, anthropic, claude, gpt 등)
      경로에 비용 추적을 위한 로그가 기록되어야 한다.
      로그에는 cost, token, usage, billing, estimatedCost, inputTokens,
      outputTokens 중 하나 이상의 필드가 반드시 포함되어야 한다.
    check_type: static_analysis
    grep_patterns:
      - "openai|vertexai|gemini|anthropic|claude|gpt"
    must_contain:
      - "cost|token|usage|billing|estimatedCost|inputTokens|outputTokens"
    must_not_contain: []
    pass_condition: "모든 AI 모델 호출 경로에 필수 필드를 포함한 비용 로그 기록"
    fail_condition: "일부 호출 경로에 로그 누락 또는 필수 필드 미기록"
    remediation: >
      AI 호출 래퍼 함수에서 응답 객체의 usage 필드를 파싱하여 inputTokens,
      outputTokens를 추출하고, 모델별 단가를 적용한 estimatedCost를 계산하여
      로깅 함수에 전달한다. 모든 AI 호출 경로에 공통 로깅 래퍼를 적용한다.
    score_impact: 10

  - id: COST-P0-007
    domain: cost
    severity: P0
    tier: 3
    name: "BQ 스캔 비용 로그"
    description: >
      BigQuery 쿼리를 실행하는 모든 코드 경로에 스캔 비용 로그가 기록되어야 한다.
      로그에는 totalBytesProcessed, bytesProcessed, estimatedCost 중 하나 이상이
      반드시 포함되어야 한다. BigQuery를 사용하지 않는 프로젝트는 N/A로 처리한다.
    check_type: log_check
    grep_patterns:
      - "bigquery|BigQuery|createQueryJob|runQuery"
    must_contain:
      - "totalBytesProcessed|bytesProcessed|estimatedCost"
    must_not_contain: []
    pass_condition: "모든 BQ 쿼리 실행 경로에 bytesProcessed + estimatedCost 기록"
    fail_condition: "BQ 사용 코드는 있으나 비용 로그 누락"
    remediation: >
      BigQuery 래퍼 함수에서 Job 완료 후 statistics를 파싱하여
      totalBytesProcessed를 추출하고, 단가(bytes * price_per_byte)로
      estimatedCost를 계산하여 로그에 기록한다.
      BQ 미사용 프로젝트는 N/A로 마킹한다.
    score_impact: 5

  - id: COST-P0-011
    domain: cost
    severity: P0
    tier: 1
    name: "캐시 우선 조회"
    description: >
      openai, vertexai, gemini, anthropic 등 고비용 AI API를 호출하기 전에
      캐시 조회 로직이 반드시 존재해야 한다. cache, Cache, redis, memo, cached,
      fromCache 중 하나 이상의 패턴이 AI 호출 코드와 함께 존재해야 한다.
      매 요청마다 캐시 없이 AI API를 직접 호출하는 것은 금지된다.
    check_type: static_analysis
    grep_patterns:
      - "openai|vertexai|gemini|anthropic"
    must_contain:
      - "cache|Cache|redis|memo|cached|fromCache"
    must_not_contain: []
    pass_condition: "고비용 API 호출 전 캐시 조회 로직 존재"
    fail_condition: "매 요청마다 캐시 없이 AI API 직접 호출"
    remediation: >
      AI API 호출 전 캐시(Redis, in-memory, Cloud Memorystore 등)를 먼저 조회한다.
      캐시 히트 시 AI API를 호출하지 않고 캐시 값을 반환한다.
      캐시 키는 요청 파라미터의 해시값으로 생성하고, TTL을 적절히 설정한다.
    score_impact: 5

  - id: LOG-P0-008
    domain: logging
    severity: P0
    tier: 2
    name: "실패 요청 로그 필수"
    description: >
      모든 에러 핸들러(catch, errorHandler, onError, .catch() 등)에서
      실패 케이스에 대한 로그가 반드시 기록되어야 한다.
      logger, log.error, winston, pino, console.error, logError 중
      하나 이상을 사용하여 4xx/5xx/timeout 모든 실패를 로그로 남겨야 한다.
    check_type: static_analysis
    grep_patterns:
      - "catch|errorHandler|onError|\\.catch\\("
    must_contain:
      - "logger|log\\.error|winston|pino|console\\.error|logError"
    must_not_contain: []
    pass_condition: "4xx/5xx/timeout 모든 실패 케이스에 로그 기록"
    fail_condition: "성공 요청만 로그 기록, 실패 케이스 누락"
    remediation: >
      모든 catch 블록과 에러 핸들러에 로그 기록 코드를 추가한다.
      예: catch (err) { logger.error('operation failed', { err, userId, path }); ... }
      전역 에러 핸들러(Express errorHandler 등)에서도 로그가 기록되도록 한다.
      성공 로그만 남기고 실패 로그를 누락하는 패턴을 점검한다.
    score_impact: 10

  - id: LOG-P0-010
    domain: logging
    severity: P0
    tier: 3
    name: "권한 변경 감사 로그"
    description: >
      역할(role) 변경과 관련된 모든 코드(updateRole, changeRole, setRole,
      grantRole, revokeRole 등)에 감사 로그(audit log)가 기록되어야 한다.
      audit, auditLog, eventLog, audit_log 중 하나 이상의 패턴이
      권한 변경 코드와 함께 존재해야 한다.
    check_type: code_review
    grep_patterns:
      - "updateRole|changeRole|setRole|grantRole|revokeRole"
    must_contain:
      - "audit|auditLog|eventLog|audit_log"
    must_not_contain: []
    pass_condition: "모든 권한 변경 이벤트에 필수 필드를 포함한 감사 로그 기록"
    fail_condition: "권한 변경 코드는 있으나 감사 로그 누락"
    remediation: >
      권한 변경 함수 내부에 감사 로그 기록 코드를 추가한다.
      감사 로그에는 변경 주체(actorId), 대상(targetUserId), 이전 역할(fromRole),
      신규 역할(toRole), 변경 사유(reason), 타임스탬프(timestamp)를 포함한다.
      예: auditLog({ event: 'role_changed', actorId, targetUserId, fromRole, toRole, timestamp })
    score_impact: 5
