<!-- 登录弹窗 -->
<div id="login-modal" class="modal" style="z-index: 10000; background: rgba(0,0,0,0.85);">
    <div class="modal-content" style="max-width: 360px; margin-top: 10vh;">
        <div class="modal-header">
            <h3><i class="fas fa-lock"></i> 系统登录</h3>
        </div>
        <div class="modal-body">
            <form id="login-form">
                <div class="form-group">
                    <label for="login-password">请输入访问密码</label>
                    <input type="password" id="login-password" placeholder="默认密码 admin" required autofocus>
                </div>
                <div id="login-error" style="color: #f1707b; font-size: 12px; margin-bottom: 10px; display: none;">密码错误，请重试</div>
                <div class="modal-footer" style="padding: 0; border: none; margin-top: 10px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
                </div>
            </form>
        </div>
    </div>
</div>
