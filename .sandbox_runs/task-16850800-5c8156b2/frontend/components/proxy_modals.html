<!-- 弹窗：代理新增/编辑 -->
<div id="proxy-modal" class="modal">
    <div class="modal-content" style="width: 480px;">
        <div class="modal-header">
            <h3 id="proxy-modal-title">添加代理</h3>
            <button type="button" class="close" onclick="closeModal('proxy-modal')" aria-label="关闭">&times;</button>
        </div>
        <form id="proxy-form">
            <input type="hidden" name="id" id="proxy-id">
            <div class="form-group">
                <label for="proxy-name">代理名称</label>
                <input id="proxy-name" type="text" name="name" required placeholder="如：公司出口代理">
            </div>
            <div class="form-row" style="display: flex; gap: 12px;">
                <div class="form-group" style="flex: 1;">
                    <label for="proxy-type">类型</label>
                    <select id="proxy-type" name="type" required>
                        <option value="http">HTTP/HTTPS</option>
                        <option value="socks5">SOCKS5</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="proxy-host">主机</label>
                    <input id="proxy-host" type="text" name="host" required placeholder="proxy.example.com">
                </div>
                <div class="form-group" style="flex: 0 0 80px;">
                    <label for="proxy-port">端口</label>
                    <input id="proxy-port" type="number" name="port" required min="1" max="65535" placeholder="8080">
                </div>
            </div>
            <div class="form-row" style="display: flex; gap: 12px;">
                <div class="form-group" style="flex: 1;">
                    <label for="proxy-username">用户名 <small style="color:#888">(可选)</small></label>
                    <input id="proxy-username" type="text" name="username" placeholder="">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="proxy-password">密码 <small style="color:#888">(可选，留空或填 ******** 表示不改)</small></label>
                    <input id="proxy-password" type="password" name="password" placeholder="编辑时填新密码可更新">
                </div>
            </div>
            <div class="form-group">
                <label for="proxy-description">备注</label>
                <input id="proxy-description" type="text" name="description" placeholder="如：用于访问外网 API">
            </div>
            <div class="form-group">
                <label class="checkbox-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" name="ignore_local" value="1" style="margin: 0;">
                    <span>忽略本地连接</span>
                </label>
                <small style="color: #888; margin-top: 4px; display: block;">勾选后，访问 10.x、127.x、192.168.x、172.16–31.x 等本地/局域网地址时自动直连，不经过代理，无需反复切换</small>
            </div>
            <div class="form-group" id="proxy-binding-group">
                <div class="form-group-title">绑定场景</div>
                <div id="proxy-binding-list" style="display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: #1e1e1e; border-radius: 4px; border: 1px solid #3c3c3c;">
                    <label class="checkbox-label" style="display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #2d2d2d; border-radius: 3px; cursor: pointer;">
                        <input type="checkbox" name="bind_terminal" value="1" style="margin: 0;">
                        <span style="font-size: 12px;">终端</span>
                    </label>
                    <label class="checkbox-label" style="display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #2d2d2d; border-radius: 3px; cursor: pointer;">
                        <input type="checkbox" name="bind_ai" value="1" style="margin: 0;">
                        <span style="font-size: 12px;">AI 对话</span>
                    </label>
                    <label class="checkbox-label" style="display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #2d2d2d; border-radius: 3px; cursor: pointer;">
                        <input type="checkbox" name="bind_skills" value="1" style="margin: 0;">
                        <span style="font-size: 12px;">技能</span>
                    </label>
                </div>
                <small style="color: #888; margin-top: 4px; display: block;">勾选后，对应功能将使用此代理进行网络连接</small>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
