<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTerm-AI - 智能运维终端</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <link rel="stylesheet" href="/static/css/xterm.css?v=1.2">
    <link rel="stylesheet" href="/static/lib/fontawesome/css/all.min.css?v=1.2">
    <!-- 拆分后的模块化样式表 -->
    <link rel="stylesheet" href="/frontend/css/base.css?v=1.3">
    <link rel="stylesheet" href="/frontend/css/modals.css?v=1.3">
    <link rel="stylesheet" href="/frontend/css/layout.css?v=1.3">
    <link rel="stylesheet" href="/frontend/css/terminal.css?v=1.3">
    <link rel="stylesheet" href="/frontend/css/ai_chat.css?v=1.3">
    <link rel="stylesheet" href="/frontend/css/sftp.css?v=1.4">
    <link rel="stylesheet" href="/frontend/css/editor.css?v=2.0">
</head>
<body>
    <div class="app-shell">
        <!-- 侧边导航栏 -->
        <nav class="sidebar" id="sidebar">
            <div class="nav-brand">
                <i class="fas fa-terminal"></i>
                <span>XTerm-AI</span>
                <button id="toggle-sidebar" class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-view="terminal-view">
                    <i class="fas fa-console"></i>
                    <span>控制台</span>
                </li>
                <li class="nav-item" data-view="server-list-view">
                    <i class="fas fa-server"></i>
                    <span>服务器管理</span>
                </li>
                <li class="nav-item" data-view="roles-view">
                    <i class="fas fa-user-robot"></i>
                    <span>AI 角色</span>
                </li>
                <li class="nav-item" data-view="model-settings-view">
                    <i class="fas fa-brain"></i>
                    <span>模型设置</span>
                </li>
                <li class="nav-item" data-view="settings-view">
                    <i class="fas fa-cog"></i>
                    <span>系统设置</span>
                </li>
            </ul>
        </nav>

        <div id="sidebar-resizer" class="resizer"></div>

        <!-- 主内容区域 -->
        <main class="content">
            <!-- 终端视图 -->
            <div id="terminal-view" class="view active">
                <div class="app-container">
                    <div class="terminal-section">
                        <!-- 标签栏 -->
                        <div class="tab-bar" id="tab-bar">
                            <div class="add-tab-btn" onclick="showQuickConnect()" title="新建标签页"><i class="fas fa-plus"></i></div>
                        </div>

                        <!-- 终端容器堆栈 -->
                        <div id="terminal-stack">
                            <!-- 快速连接 / 历史记录页面 -->
                            <div id="quick-connect-page" class="view active">
                                <div class="quick-connect-container">
                                    <div class="quick-connect-header">
                                        <h2><i class="fas fa-history"></i> 最近连接</h2>
                                        <button class="btn-clear-history" onclick="clearConnectionHistory()" title="清空历史"><i class="fas fa-trash-alt"></i></button>
                                    </div>
                                    <div id="connection-history-list" class="history-grid">
                                        <!-- 历史记录列表 -->
                                        <div class="empty-tip">暂无最近连接记录</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 底部交互面板的分隔线 -->
                        <div id="bottom-panel-resizer" class="resizer-h"></div>
                        
                        <!-- 底部交互面板 -->
                        <div id="bottom-panel" class="bottom-panel">
                            <div class="bottom-panel-header">
                                <div class="panel-tabs">
                                    <div class="panel-tab active" data-panel="sftp-panel">文件</div>
                                    <div class="panel-tab" data-panel="commands-panel">命令</div>
                                </div>
                                <button class="toggle-btn-small" id="toggle-bottom-panel" title="折叠/展开"><i class="fas fa-chevron-down"></i></button>
                            </div>
                            
                            <!-- SFTP 文件管理器 -->
                            <div id="sftp-panel" class="bottom-panel-content sftp-container active">
                                <div class="sftp-toolbar">
                                    <button class="btn-icon" onclick="sftpGoBack()" title="返回上级"><i class="fas fa-arrow-left"></i></button>
                                    <button class="btn-icon" onclick="sftpRefresh()" title="刷新"><i class="fas fa-sync-alt"></i></button>
                                    <div class="sftp-address-bar">
                                        <i class="fas fa-folder-open" style="color: #666; margin-right: 8px;"></i>
                                        <input type="text" id="sftp-current-path" value="/" onkeydown="if(event.keyCode==13) loadSftpFiles(this.value)">
                                    </div>
                                    <button class="btn btn-sm btn-primary" onclick="showUploadModal()" title="上传文件"><i class="fas fa-upload"></i> 上传</button>
                                    <input type="file" id="sftp-upload-input" multiple style="display: none;" onchange="handleSftpUpload(event)">
                                </div>
                                <div class="sftp-file-list" id="sftp-file-list">
                                    <!-- 文件列表头 -->
                                    <div class="sftp-file-item header" style="font-weight: bold; border-bottom: 1px solid #333; position: sticky; top: 0; background: #1e1e1e; z-index: 5;">
                                        <span class="file-icon"></span>
                                        <span class="file-name">名称</span>
                                        <span class="file-size">大小</span>
                                        <span class="file-perms">权限</span>
                                        <span class="file-time">修改时间</span>
                                    </div>
                                    <div id="sftp-files-container">
                                        <!-- 动态加载文件内容 -->
                                    </div>
                                </div>
                            </div>

                            <!-- 常用命令列表 -->
                            <div id="commands-panel" class="bottom-panel-content commands-container">
                                <div class="commands-layout" style="display: flex; height: 100%;">
                                    <div class="commands-sidebar" style="width: 150px; border-right: 1px solid #333; overflow-y: auto;">
                                        <div class="commands-sidebar-header" style="padding: 8px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
                                            <span style="font-size: 12px; color: #888;">分类</span>
                                            <i class="fas fa-plus-circle" style="cursor: pointer; color: #0078d4;" onclick="showAddCommandGroupModal()"></i>
                                        </div>
                                        <div id="command-groups-list">
                                            <!-- 分组列表 -->
                                        </div>
                                    </div>
                                    <div class="commands-main" style="flex: 1; overflow-y: auto; padding: 10px;">
                                        <div class="commands-main-header" style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                                            <span id="current-group-name" style="font-weight: bold; color: #eee;">常用命令</span>
                                            <button class="btn btn-sm btn-primary" onclick="showAddCommandModal()"><i class="fas fa-plus"></i> 添加命令</button>
                                        </div>
                                        <div id="commands-grid" class="commands-grid">
                                            <!-- 命令磁贴列表 -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="ai-resizer" class="resizer"></div>

                    <!-- AI 面板折叠/展开浮动按钮（始终可见，不受 overflow:hidden 影响） -->
                    <div id="ai-toggle-strip" title="折叠/展开 AI 面板">
                        <i class="fas fa-chevron-right"></i>
                    </div>

                    <!-- 右侧 AI 对话栏 -->
                    <div class="ai-section" id="ai-section">
                        <!-- 标签页 -->
                        <div class="stats-tabs">
                            <div class="stats-tab active" data-tab="ai-chat">AI 对话</div>
                            <div class="stats-tab" data-tab="sys-info">系统信息</div>
                        </div>
                        
                        <div id="ai-chat-view" class="stats-tab-content active">
                            <div class="ai-header">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="status-dot" id="ai-status"></div>
                                    <span style="font-size: 0.9rem; font-weight: bold;">智能运维助手</span>
                                </div>
                                <div style="display: flex; gap: 8px;">
                                    <select id="ai-mode-select" style="background: #3c3c3c; color: #eee; border: 1px solid #555; font-size: 12px; padding: 2px 5px; border-radius: 4px;">
                                        <option value="agent">Agent 模式</option>
                                        <option value="ask">Ask 模式</option>
                                    </select>
                                    <button id="clear-chat-btn" class="btn-icon" title="清空对话" onclick="clearChat()"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            </div>
                            <div class="ai-messages" id="ai-messages">
                                <!-- 消息内容 -->
                            </div>
                            <div class="ai-input-area">
                                <textarea id="ai-input" placeholder="输入运维指令或问题..."></textarea>
                                <button id="send-btn" title="发送 (Enter)">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>

                        <div id="sys-info-view" class="stats-tab-content">
                            <!-- 系统信息视图内容 -->
                            <div class="info-container">
                                <div class="info-section">
                                    <div class="info-row"><span>主机名:</span> <span id="info-hostname">-</span></div>
                                    <div class="info-row"><span>系统:</span> <span id="info-os">-</span></div>
                                    <div class="info-row"><span>运行时间:</span> <span id="info-uptime">-</span></div>
                                    <div class="info-row"><span>内网 IP:</span> <span id="info-ip">-</span></div>
                                    <div class="info-row"><span>平均负载:</span> <span id="info-load">-</span></div>
                                </div>
                                
                                <div class="info-section">
                                    <div class="gauge-label">CPU <span id="info-cpu-val">0%</span></div>
                                    <div class="gauge-bar"><div id="info-cpu-bar" class="gauge-fill" style="width: 0%"></div></div>
                                    
                                    <div class="gauge-label">内存 <span id="info-mem-val">0/0</span></div>
                                    <div class="gauge-bar"><div id="info-mem-bar" class="gauge-fill" style="width: 0%"></div></div>
                                    
                                    <div class="gauge-label">根分区 <span id="info-disk-val">0/0</span></div>
                                    <div class="gauge-bar"><div id="info-disk-bar" class="gauge-fill" style="width: 0%"></div></div>
                                </div>

                                <div class="info-section">
                                    <table class="proc-table">
                                        <thead>
                                            <tr>
                                                <th class="sortable" data-sort="mem">内存 <i class="fas fa-sort"></i></th>
                                                <th class="sortable" data-sort="cpu">CPU <i class="fas fa-sort"></i></th>
                                                <th class="sortable" data-sort="cmd">命令 <i class="fas fa-sort"></i></th>
                                            </tr>
                                        </thead>
                                        <tbody id="proc-list">
                                            <!-- 进程列表 -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 服务器列表视图 -->
            <div id="server-list-view" class="view">
                <div class="view-header">
                    <h2>服务器资产管理</h2>
                    <button class="btn btn-primary" onclick="showAddServerModal()">
                        <i class="fas fa-plus"></i> 添加服务器
                    </button>
                </div>
                <div class="server-groups" id="server-list-container"></div>
            </div>

            <!-- 角色管理视图 -->
            <div id="roles-view" class="view">
                <div class="view-header">
                    <h2>AI 角色管理</h2>
                    <button class="btn btn-primary" onclick="showAddRoleModal()">
                        <i class="fas fa-plus"></i> 创建角色
                    </button>
                </div>
                <div class="settings-container" style="padding: 20px;">
                    <div id="role-list-container" class="role-grid"></div>
                </div>
            </div>

            <!-- 模型设置视图 -->
            <div id="model-settings-view" class="view">
                <div class="view-header">
                    <h2>模型端点管理</h2>
                    <button class="btn btn-primary" onclick="showAddAIModal()">
                        <i class="fas fa-plus"></i> 添加端点
                    </button>
                </div>
                <div class="settings-container" style="padding: 20px;">
                    <div id="ai-list-container" class="ai-list"></div>
                </div>
            </div>

            <!-- 系统设置视图 -->
            <div id="settings-view" class="view">
                <div class="view-header">
                    <h2>系统设置</h2>
                </div>
                <div class="settings-container" style="padding: 20px;">
                    <section class="settings-section">
                        <h3 style="margin-bottom: 15px; color: #0078d4;">日志设置</h3>
                        <form id="system-settings-form">
                            <div class="form-group">
                                <label>日志开关</label>
                                <select name="log_enabled">
                                    <option value="1">开启</option>
                                    <option value="0">关闭</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>日志级别</label>
                                <select name="log_level">
                                    <option value="DEBUG">DEBUG (详细调试，记录 AI 原始内容)</option>
                                    <option value="INFO">INFO (普通信息)</option>
                                    <option value="WARNING">WARNING (警告)</option>
                                    <option value="ERROR">ERROR (错误)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>日志保存目录</label>
                                <input type="text" name="log_path" placeholder="../logs">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>单文件最大大小 (MB)</label>
                                    <input type="number" name="log_max_size" value="10">
                                </div>
                                <div class="form-group">
                                    <label>保留文件数</label>
                                    <input type="number" name="log_backup_count" value="10">
                                </div>
                            </div>
                            <div class="modal-footer" style="padding: 0; border: none; margin-top: 20px; justify-content: flex-start; gap: 10px;">
                                <button type="submit" class="btn btn-primary">保存系统设置</button>
                                <button type="button" class="btn btn-secondary" onclick="showLogsModal()">查看系统日志</button>
                                <button type="button" class="btn btn-danger" onclick="handleClearLogs()">清空所有日志</button>
                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <!-- 动态注入弹窗组件的占位符 -->
    <div id="component-placeholder"></div>

    <script src="/static/js/xterm.js"></script>
    <script src="/static/js/xterm-addon-fit.js"></script>
    <script src="/static/js/marked.min.js"></script>
    <script src="/static/lib/ace/ace.js"></script>
    <script src="/static/lib/ace/ext-language_tools.js"></script>
    <script src="/static/lib/ace/ext-modelist.js"></script>
    <script src="/static/lib/ace/ext-searchbox.js"></script>

    <!-- 主程序入口 (ES Modules) -->
    <script type="module" src="/frontend/app.js?v=1.9"></script>
</body>
</html>
