<!-- 弹窗：命令分组 -->
<div id="command-group-modal" class="modal">
    <div class="modal-content" style="width: 400px;">
        <div class="modal-header">
            <h3 id="command-group-modal-title">命令分类</h3>
            <button type="button" class="close" onclick="closeModal('command-group-modal')" aria-label="关闭">&times;</button>
        </div>
        <form id="command-group-form">
            <input type="hidden" name="id" id="command-group-id">
            <div class="form-group"><label for="command-group-name">分类名称</label><input id="command-group-name" type="text" name="name" required placeholder="例如：Docker 常用"></div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary">保存</button></div>
        </form>
    </div>
</div>

<!-- 弹窗：快捷命令 -->
<div id="command-modal" class="modal">
    <div class="modal-content" style="width: 500px;">
        <div class="modal-header">
            <h3 id="command-modal-title">快捷命令</h3>
            <button type="button" class="close" onclick="closeModal('command-modal')" aria-label="关闭">&times;</button>
        </div>
        <form id="command-form">
            <input type="hidden" name="id" id="command-id">
            <input type="hidden" name="group_id" id="command-group-id-hidden">
            <div class="form-group"><label for="command-name">命令名称</label><input id="command-name" type="text" name="name" required placeholder="例如：重启 Nginx"></div>
            <div class="form-group">
                <label for="command-content">指令内容</label>
                <textarea id="command-content" name="content" rows="5" required style="font-family: monospace; font-size: 0.9rem;"></textarea>
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="auto_cr" value="1" checked> 自动添加回车符 (CR)
                </label>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary">保存</button></div>
        </form>
    </div>
</div>
