<!-- 文件编辑器弹窗 -->
<div id="editor-modal" class="editor-modal">
    <div class="editor-modal-content">
        <div class="editor-toolbar">
            <div class="toolbar-left" style="display: flex; gap: 10px; align-items: center;">
                <button class="btn btn-sm btn-primary" onclick="saveEditorContent()" title="Ctrl+S"><i class="fas fa-save"></i> 保存</button>
                <button class="btn btn-sm btn-secondary" onclick="refreshEditorContent()"><i class="fas fa-sync-alt"></i> 刷新</button>
                <span id="editor-filename" class="editor-filename" style="color: #eee; font-size: 14px; font-weight: bold; margin-left: 10px;">filename.txt</span>
                <div class="toolbar-separator" style="width: 1px; height: 20px; background: #444; margin: 0 5px;"></div>
                <button class="btn btn-sm btn-secondary" onclick="toggleEditorSearch('find')"><i class="fas fa-search"></i> 搜索</button>
                <button class="btn btn-sm btn-secondary" onclick="toggleEditorSearch('replace')"><i class="fas fa-exchange-alt"></i> 替换</button>
                <button class="btn btn-sm btn-secondary" onclick="showJumpLine()"><i class="fas fa-long-arrow-alt-right"></i> 跳转行</button>
            </div>
            <div class="toolbar-right" style="display: flex; gap: 10px; align-items: center;">
                <div class="editor-settings-item">
                    <label style="font-size: 12px; color: #888; margin-right: 5px;">主题</label>
                    <select id="editor-theme-select" onchange="changeEditorTheme(this.value)" style="background: #3c3c3c; color: #eee; border: 1px solid #444; padding: 2px 5px; border-radius: 3px;">
                        <option value="monokai">Monokai</option>
                        <option value="chrome">Chrome</option>
                        <option value="clouds_midnight">Clouds Midnight</option>
                        <option value="tomorrow_night_bright">Tomorrow Night</option>
                    </select>
                </div>
                <div class="editor-settings-item">
                    <label style="font-size: 12px; color: #888; margin-right: 5px;">字号</label>
                    <select id="editor-font-size" onchange="changeEditorFontSize(this.value)" style="background: #3c3c3c; color: #eee; border: 1px solid #444; padding: 2px 5px; border-radius: 3px;">
                        <option value="12px">12px</option>
                        <option value="14px" selected>14px</option>
                        <option value="16px">16px</option>
                        <option value="18px">18px</option>
                        <option value="20px">20px</option>
                    </select>
                </div>
                <div class="dropdown" style="position: relative;">
                    <button class="btn btn-sm btn-secondary dropdown-toggle" onclick="toggleEditorSettingsMenu()"><i class="fas fa-cog"></i> 设置 <i class="fas fa-caret-down"></i></button>
                    <div id="editor-settings-menu" class="dropdown-menu" style="display: none; position: absolute; right: 0; top: 100%; background: #2d2d2d; border: 1px solid #444; padding: 10px; border-radius: 4px; z-index: 100; min-width: 150px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
                        <label class="dropdown-item" style="display: block; margin-bottom: 5px; cursor: pointer;"><input type="checkbox" id="edit-wrap" onchange="toggleEditorOption('wrap', this.checked)"> 自动换行</label>
                        <label class="dropdown-item" style="display: block; margin-bottom: 5px; cursor: pointer;"><input type="checkbox" id="edit-autocomplete" checked onchange="toggleEditorOption('autocomplete', this.checked)"> 代码自动完成</label>
                        <label class="dropdown-item" style="display: block; margin-bottom: 5px; cursor: pointer;"><input type="checkbox" id="edit-snippets" onchange="toggleEditorOption('snippets', this.checked)"> 启用代码段</label>
                        <label class="dropdown-item" style="display: block; margin-bottom: 5px; cursor: pointer;"><input type="checkbox" id="edit-invisible" onchange="toggleEditorOption('invisible', this.checked)"> 显示隐形字符</label>
                        <label class="dropdown-item" style="display: block; margin-bottom: 0; cursor: pointer;"><input type="checkbox" id="edit-linenumbers" checked onchange="toggleEditorOption('linenumbers', this.checked)"> 显示行号</label>
                    </div>
                </div>
                <button class="btn btn-sm btn-secondary" onclick="showShortcuts()"><i class="fas fa-keyboard"></i> 快捷键</button>
                <span class="close" onclick="closeEditorModal()" style="font-size: 20px; cursor: pointer; color: #888; margin-left: 10px;">&times;</span>
            </div>
        </div>
        <div class="ace-editor-container">
            <div id="ace-editor"></div>
        </div>
        <div class="editor-footer">
            <div class="footer-left">
                <span id="editor-status-path">/path/to/file</span>
            </div>
            <div class="footer-right">
                <span id="editor-status-info">Ln: 1, Col: 1</span>
                <span class="footer-separator">|</span>
                <select id="editor-tab-size" onchange="changeEditorTabSize(this.value)">
                    <option value="2">制表符: 2</option>
                    <option value="4" selected>制表符: 4</option>
                    <option value="8">制表符: 8</option>
                </select>
                <span class="footer-separator">|</span>
                <span id="editor-encoding">编码: UTF-8</span>
                <span class="footer-separator">|</span>
                <span id="editor-mode-display">语言: Text</span>
            </div>
        </div>
    </div>
</div>

<!-- 弹窗：编辑器跳转行 -->
<div id="editor-jump-modal" class="modal">
    <div class="modal-content" style="width: 300px;">
        <div class="modal-header">
            <h3>跳转到行</h3>
            <span class="close" onclick="closeModal('editor-jump-modal')">&times;</span>
        </div>
        <form id="editor-jump-form">
            <div class="form-group">
                <label>行号</label>
                <input type="number" id="editor-jump-line" required min="1" placeholder="输入行号">
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">确定</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal('editor-jump-modal')">取消</button>
            </div>
        </form>
    </div>
</div>

<!-- 弹窗：编辑器快捷键 -->
<div id="editor-shortcuts-modal" class="modal">
    <div class="modal-content" style="width: 400px;">
        <div class="modal-header">
            <h3>编辑器快捷键</h3>
            <span class="close" onclick="closeModal('editor-shortcuts-modal')">&times;</span>
        </div>
        <div class="modal-body" style="padding: 20px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.9rem;">
                <div style="color: #888;">保存</div><div style="color: #0078d4; font-weight: bold;">Ctrl + S</div>
                <div style="color: #888;">搜索</div><div style="color: #0078d4; font-weight: bold;">Ctrl + F</div>
                <div style="color: #888;">替换</div><div style="color: #0078d4; font-weight: bold;">Ctrl + H</div>
                <div style="color: #888;">跳转行</div><div style="color: #0078d4; font-weight: bold;">Ctrl + G</div>
                <div style="color: #888;">全选</div><div style="color: #0078d4; font-weight: bold;">Ctrl + A</div>
                <div style="color: #888;">撤销</div><div style="color: #0078d4; font-weight: bold;">Ctrl + Z</div>
                <div style="color: #888;">重做</div><div style="color: #0078d4; font-weight: bold;">Ctrl + Y</div>
                <div style="color: #888;">注释/取消</div><div style="color: #0078d4; font-weight: bold;">Ctrl + /</div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="closeModal('editor-shortcuts-modal')">关闭</button>
        </div>
    </div>
</div>
