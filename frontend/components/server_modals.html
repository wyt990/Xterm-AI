<!-- 弹窗：服务器管理 (添加/编辑) -->
<div id="server-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="server-modal-title">添加服务器</h3>
            <span class="close" onclick="closeModal('server-modal')">&times;</span>
        </div>
        <form id="server-form">
            <input type="hidden" name="id" id="server-id">
            <div class="form-group"><label>名称</label><input type="text" name="name" required></div>
            <div class="form-row">
                <div class="form-group"><label>主机</label><input type="text" name="host" required></div>
                <div class="form-group"><label>端口</label><input type="number" name="port" value="22"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>账号</label><input type="text" name="username" value="root"></div>
                <div class="form-group"><label>密码</label><input type="password" name="password"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>分组</label><input type="text" name="group_name" placeholder="default"></div>
                <div class="form-group">
                    <label>类型</label>
                    <select name="device_type">
                        <option value="linux">Linux</option>
                        <option value="windows">Windows</option>
                        <option value="H3C">H3C</option>
                        <option value="huawei">华为</option>
                        <option value="ruijie">锐捷</option>
                        <option value="ruijie">思科</option>
                        <option value="other">其它</option>
                    </select>
                </div>
            </div>
            <div class="form-group"><label>备注</label><textarea name="description" rows="2"></textarea></div>
            <div class="modal-footer" style="justify-content: space-between;">
                <button type="button" class="btn btn-secondary" onclick="testSSHFromModal(event)">测试连接</button>
                <button type="submit" class="btn btn-primary">保存</button>
            </div>
        </form>
    </div>
</div>
