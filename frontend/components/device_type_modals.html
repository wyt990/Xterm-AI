<!-- 弹窗：系统类型管理 -->
<div id="device-type-mgr-modal" class="modal">
    <div class="modal-content" style="width: 700px;">
        <div class="modal-header">
            <h3>系统类型管理</h3>
            <span class="close" onclick="closeModal('device-type-mgr-modal')">&times;</span>
        </div>
        <div class="modal-body">
            <div style="margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;">
                <span style="color: #888; font-size: 13px;">定义服务器的操作系统或型号，并绑定 AI 专家角色。</span>
                <button class="btn btn-sm btn-primary" onclick="showAddDeviceType()"><i class="fas fa-plus"></i> 新增类型</button>
            </div>
            <div class="device-type-table-container" style="max-height: 400px; overflow-y: auto;">
                <table class="proc-table">
                    <thead>
                        <tr>
                            <th style="width: 120px;">类型名称</th>
                            <th style="width: 100px;">标识符</th>
                            <th style="width: 60px;">图标</th>
                            <th>绑定 AI 角色</th>
                            <th style="width: 100px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="device-type-list-body">
                        <!-- 由 JS 填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 弹窗：新增/编辑系统类型 -->
<div id="device-type-edit-modal" class="modal">
    <div class="modal-content" style="width: 400px; margin-top: 100px;">
        <div class="modal-header">
            <h3 id="device-type-modal-title">编辑系统类型</h3>
            <span class="close" onclick="closeModal('device-type-edit-modal')">&times;</span>
        </div>
        <form id="device-type-form">
            <input type="hidden" name="id" id="dt-id">
            <div class="form-group">
                <label>名称</label>
                <input type="text" name="name" required placeholder="如：Ubuntu 22.04">
            </div>
            <div class="form-group">
                <label>标识符 (value)</label>
                <input type="text" name="value" required placeholder="如：linux_ubuntu">
            </div>
            <div class="form-group">
                <label>图标 (FontAwesome)</label>
                <input type="text" name="icon" placeholder="fab fa-linux">
            </div>
            <div class="form-group">
                <label>默认 AI 角色</label>
                <select name="role_id" id="dt-role-select">
                    <option value="">不绑定（使用系统激活角色）</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">提交保存</button>
            </div>
        </form>
    </div>
</div>
